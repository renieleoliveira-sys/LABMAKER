<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Acompanhar Solicitação</title>

<style>
body {
    font-family: Arial, Helvetica, sans-serif;
    background: #f4f6fb;
    margin: 0;
}

.titulo {
    background: linear-gradient(to right, #1c3d91, #2c55c0);
    color: white;
    text-align: center;
    padding: 20px;
    font-size: 28px;
    font-weight: 500;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.busca {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 12px;
    margin: 60px auto;
    padding: 20px;
    max-width: 900px;
    flex-wrap: wrap;
}


.labelbuscar {
    color: #1c3d91;
    font-size: 16px;
    text-align: center;
}


.busca input {
    padding: 12px 15px;
    border-radius: 10px;
    border: none;
    width: 350px;
    background: #b8d9ff;
    outline: none;
    transition: 0.3s;
    font-size: 14px;
}

.busca input:focus {
    box-shadow: 0 0 0 2px #2c55c0;
}


.busca button {
    padding: 12px 20px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(45deg, #1c3d91, #2c55c0);
    color: white;
    cursor: pointer;
    transition: 0.3s;
    font-weight: bold;
}

.busca button:hover {
    transform: scale(1.05);
    background: linear-gradient(45deg, #2c55c0, #1c3d91);
}

.voltarparaindex {
    display: block;
    margin: 40px auto;
    width: fit-content;
    background: linear-gradient(135deg, #1c3d91, #2c55c0);
    color: white;
    text-decoration: none;
    padding: 10px 18px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 500;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    transition: 0.3s;
}

.voltarparaindex:hover {
    transform: translateY(-3px);
    box-shadow: 0 10px 20px rgba(0,0,0,0.25);
    background: linear-gradient(135deg, #2c55c0, #1c3d91);
}

/* RESPONSIVO */
@media (max-width: 600px) {

    .titulo {
        font-size: 22px;
        padding: 15px;
    }

    .busca {
        flex-direction: column;
        gap: 15px;
        margin: 40px 20px;
    }

    .busca input {
        width: 100%;
    }

    .labelbuscar {
        font-size: 14px;
    }

}
</style>

</head>

<body>

<div class="titulo">Acompanhar Solicação</div>

<!-- BUSCAR -->
<div class="busca">
    <label class="labelbuscar">Digite o número do protocolo ou o nome completo:</label>
    <input type="text" id="protocolo" placeholder="Digite seu protocolo ou o nome completo">
    <button onclick="buscar()">Buscar</button>
</div>

<a href="index.html" class="voltarparaindex">Voltar</a>

<script>
function buscar() {
    const valor = document.getElementById("protocolo").value;

    if (valor.trim() === "") {
        alert("Digite um protocolo ou nome!");
        return;
    }

    window.location.href = "kanban.html?busca=" + encodeURIComponent(valor);
}
</script>

</body>
</html>
