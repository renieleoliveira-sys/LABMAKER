<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<title>Agendamentos - LabMaker</title>

<link rel="stylesheet" href="styleagendamneto.css">

<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
</head>

<body>

<h2 class="inicio">Agendamento do Laboratório Maker</h2>
<h3 class="inicio1">
    Escolha a data, horário e preencha os dados para solicitar o agendamento
</h3>

<div class="container-agendamento">

    <!-- ETAPA 1 -->
    <div id="etapa1" class="etapa ativa">
        <div id="calendario"></div>
        <a href="index.html" class="voltarindex">Voltar</a>
    </div>

    <p id="dataSelecionada" style="display:none; font-weight:bold; color:#1c3d91;"></p>

    <!-- ETAPA 2 -->
    <div id="etapa2" class="etapa">

        <div class="horariogeral" id="horariogeral">
            <h3 class="titulo">
                <!-- Ícone -->
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 16 16">
                    <path d="M8 3.5a.5.5 0 0 0-1 0V9a.5.5 0 0 0 .252.434l3.5 2a.5.5 0 0 0 .496-.868L8 8.71z"/>
                    <path d="M8 16A8 8 0 1 0 8 0a8 8 0 0 0 0 16m7-8A7 7 0 1 1 1 8a7 7 0 0 1 14 0"/>
                </svg>
                Escolha um horário disponível
            </h3>

            <div class="horarios">
                
                <div class="horariosdia">
                    <input type="hidden" id="dataInput">
                    <input type="hidden" id="horaInput">

                    <button>07:00</button>
                    <button>08:00</button>
                    <button>09:00</button>
                    <button>10:00</button>
                    <button>11:00</button>
                </div>

                <div class="horariostarde">
                    <button>13:00</button>
                    <button>14:00</button>
                    <button>15:00</button>
                    <button>16:00</button>
                    <button>17:00</button>
                </div>

                <div class="horariosnoite">
                    <button>18:00</button>
                    <button>19:00</button>
                    <button>20:00</button>
                    <button>21:00</button>
                    <button>22:00</button>
                </div>

            </div>
        </div>

        <button class="voltar" onclick="mostrarEtapa(1)">⬅ Voltar</button>
    </div>

    <!-- ETAPA 3 -->
    <div id="etapa3" class="etapa">

        <p class="mensagemCadastro">
            ⚠️ Agora preencha seus dados para finalizar o agendamento.
        </p>

        <div class="cadastro">
            <div class="icone-e-nome">

                <form method="get" class="formulario" id="formSolicitacao">

                    <h1 class="iconeagendamento">
                        <svg xmlns="http://www.w3.org/2000/svg" width="25" height="25" fill="currentColor" viewBox="0 0 16 16">
                            <path d="M8 8a3 3 0 1 0 0-6 3 3 0 0 0 0 6m2-3a2 2 0 1 1-4 0 2 2 0 0 1 4 0m4 8c0 1-1 1-1 1H3s-1 0-1-1 1-4 6-4 6 3 6 4"/>
                        </svg>
                        Solicitação de Agendamento
                    </h1>

                    <!-- CAMPOS -->
                    <input type="hidden" id="dataInput">
                    <input type="hidden" id="horaInput">

                    <!-- NOME -->
                    <label>Nome Completo:</label>
                    <div class="icone-input-nome">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="bi bi-person" viewBox="0 0 16 16">
                            <path d="M8 8a3 3 0 1 0 0-6 3 3 0 0 0 0 6m2-3a2 2 0 1 1-4 0 2 2 0 0 1 4 0m4 8c0 1-1 1-1 1H3s-1 0-1-1 1-4 6-4 6 3 6 4m-1-.004c-.001-.246-.154-.986-.832-1.664C11.516 10.68 10.289 10 8 10s-3.516.68-4.168 1.332c-.678.678-.83 1.418-.832 1.664z"/>
                        </svg>
                        <input type="text" name="nome" placeholder="Digite seu nome completo" required>
                    </div>

                    <!-- TELEFONE -->
                    <label>Número de telefone:</label>
                    <div class="icone-input-telefone">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-telephone" viewBox="0 0 16 16">
                            <path d="M3.654 1.328a.678.678 0 0 0-1.015-.063L1.605 2.3c-.483.484-.661 1.169-.45 1.77a17.6 17.6 0 0 0 4.168 6.608 17.6 17.6 0 0 0 6.608 4.168c.601.211 1.286.033 1.77-.45l1.034-1.034a.678.678 0 0 0-.063-1.015l-2.307-1.794a.68.68 0 0 0-.58-.122l-2.19.547a1.75 1.75 0 0 1-1.657-.459L5.482 8.062a1.75 1.75 0 0 1-.46-1.657l.548-2.19a.68.68 0 0 0-.122-.58zM1.884.511a1.745 1.745 0 0 1 2.612.163L6.29 2.98c.329.423.445.974.315 1.494l-.547 2.19a.68.68 0 0 0 .178.643l2.457 2.457a.68.68 0 0 0 .644.178l2.189-.547a1.75 1.75 0 0 1 1.494.315l2.306 1.794c.829.645.905 1.87.163 2.611l-1.034 1.034c-.74.74-1.846 1.065-2.877.702a18.6 18.6 0 0 1-7.01-4.42 18.6 18.6 0 0 1-4.42-7.009c-.362-1.03-.037-2.137.703-2.877z"/>
                        </svg>
                        <input type="tel" name="telefone" id="telefone" placeholder="(00) 00000-0000" maxlength="15" required>
                    </div>

                    <!-- QUANTIDADE -->
                    <label>Quantidade de Pessoas:</label>
                    <div class="icone-input-quant-pessoas">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-people" viewBox="0 0 16 16">
                            <path d="M15 14s1 0 1-1-1-4-5-4-5 3-5 4 1 1 1 1zm-7.978-1L7 12.996c.001-.264.167-1.03.76-1.72C8.312 10.629 9.282 10 11 10c1.717 0 2.687.63 3.24 1.276.593.69.758 1.457.76 1.72l-.008.002-.014.002zM11 7a2 2 0 1 0 0-4 2 2 0 0 0 0 4m3-2a3 3 0 1 1-6 0 3 3 0 0 1 6 0M6.936 9.28a6 6 0 0 0-1.23-.247A7 7 0 0 0 5 9c-4 0-5 3-5 4q0 1 1 1h4.216A2.24 2.24 0 0 1 5 13c0-1.01.377-2.042 1.09-2.904.243-.294.526-.569.846-.816M4.92 10A5.5 5.5 0 0 0 4 13H1c0-.26.164-1.03.76-1.724.545-.636 1.492-1.256 3.16-1.275ZM1.5 5.5a3 3 0 1 1 6 0 3 3 0 0 1-6 0m3-2a2 2 0 1 0 0 4 2 2 0 0 0 0-4"/>
                        </svg>
                        <input type="number" name="quantidade" placeholder="Ex: 2" min="1" max="40" required>
                    </div>

                    <!-- DESCRIÇÃO -->
                    <label>Descrição da Solicitação:</label>
                    <div class="icone-input-descricao">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-journal-text" viewBox="0 0 16 16">
                            <path d="M5 10.5a.5.5 0 0 1 .5-.5h2a.5.5 0 0 1 0 1h-2a.5.5 0 0 1-.5-.5m0-2a.5.5 0 0 1 .5-.5h5a.5.5 0 0 1 0 1h-5a.5.5 0 0 1-.5-.5m0-2a.5.5 0 0 1 .5-.5h5a.5.5 0 0 1 0 1h-5a.5.5 0 0 1-.5-.5m0-2a.5.5 0 0 1 .5-.5h5a.5.5 0 0 1 0 1h-5a.5.5 0 0 1-.5-.5"/>
                            <path d="M3 0h10a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2v-1h1v1a1 1 0 0 0 1 1h10a1 1 0 0 0 1-1V2a1 1 0 0 0-1-1H3a1 1 0 0 0-1 1v1H1V2a2 2 0 0 1 2-2"/>
                            <path d="M1 5v-.5a.5.5 0 0 1 1 0V5h.5a.5.5 0 0 1 0 1h-2a.5.5 0 0 1 0-1zm0 3v-.5a.5.5 0 0 1 1 0V8h.5a.5.5 0 0 1 0 1h-2a.5.5 0 0 1 0-1zm0 3v-.5a.5.5 0 0 1 1 0v.5h.5a.5.5 0 0 1 0 1h-2a.5.5 0 0 1 0-1z"/>
                        </svg>
                        <textarea name="descricao" placeholder="Descreva sua solicitação" required></textarea>
                    </div>

                    <!-- BOTÃO -->
                    <button class="btnsolicitarAgendamento" type="submit">
                        Solicitar agendamento
                    </button>

                </form>

            </div>
        </div>

        <button class="voltar" onclick="mostrarEtapa(2)">⬅ Voltar</button>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
