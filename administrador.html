<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel do Administrador</title>

<style>
body {
    font-family: Arial;
    background: #f4f6fb;
    margin: 0;
}

header {
    background: #1c3d91;
    color: white;
    text-align: center;
    padding: 20px;
}

.container {
    width: 90%;
    margin: auto;
    margin-top: 40px;
}

.box {
    background: white;
    padding: 20px;
    border-radius: 10px;
    margin-bottom: 30px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

input, button {
    padding: 10px;
    margin: 5px;
}

button {
    background: #1c3d91;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

.kanban {
    display: flex;
    gap: 20px;
    height: 300px;
}

.coluna {
    flex: 1;
    padding: 10px;
    border-radius: 10px;
}

.recebido { background: #0037ff; }
.analise { background: #ffc400; }
.fazendo { background: #ff7b00; }
.concluido { background: #03e703; }

.card {
    background: white;
    padding: 10px;
    margin-top: 10px;
    border-radius: 5px;
    box-shadow: 0 2px 5px rgb(0, 60, 255);
    cursor: pointer;
}

.remover {
    background: red;
    margin-left: 10px;
}

.csv {
    margin-left: 83%;
    width: 200px;
    height: 50px;
}

.voltar-login {
    display: block;
    margin: 40px auto;
    width: fit-content;
    background: linear-gradient(135deg, #1c3d91, #2c55c0);
    color: white;
    text-decoration: none;
    padding: 10px 16px;
    border-radius: 10px;
}
</style>
</head>

<body>

<header>
    <h1>Área do Administrador</h1>
</header>

<div class="container">

    <!-- HORÁRIOS -->
    <div class="box">
        <h2>Gerenciar horários</h2>

        <input type="date" id="data">
        <input type="time" id="hora">
        <button onclick="adicionarHorario()">Adicionar</button>

        <ul id="listaHorarios"></ul>
    </div>

    <!-- KANBAN -->
    <div class="box">
        <h2>Agendamentos</h2>

        <div class="kanban">

            <div class="coluna recebido">
                <h3>Recebido</h3>
                <div id="recebido"></div>
            </div>

            <div class="coluna analise">
                <h3>Análise</h3>
                <div id="analise"></div>
            </div>

            <div class="coluna fazendo">
                <h3>Fazendo</h3>
                <div id="fazendo"></div>
            </div>

            <div class="coluna concluido">
                <h3>Concluído</h3>
                <div id="concluido"></div>
            </div>

        </div>
    </div>

</div>

<button onclick="baixarCSV()" class="csv">📥 Baixar Planilha</button>
<a href="loginAdmin.html" class="voltar-login">Voltar</a>

<script>

// ==========================
// ADICIONAR HORÁRIO
// ==========================
function adicionarHorario() {
    const data = document.getElementById("data").value;
    const hora = document.getElementById("hora").value;

    if (!data || !hora) {
        alert("Preencha data e hora!");
        return;
    }

    fetch("http://localhost:3000/horarios", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ data, hora })
    })
    .then(res => res.text())
    .then(msg => {
        alert(msg);
        carregarHorarios();
    });
}

// ==========================
// LISTAR HORÁRIOS + REMOVER
// ==========================
function carregarHorarios() {
    fetch("http://localhost:3000/horarios")
    .then(res => res.json())
    .then(horarios => {

        const lista = document.getElementById("listaHorarios");
        lista.innerHTML = "";

        horarios.forEach(h => {

            const item = document.createElement("li");

            item.innerHTML = `
                ${h.data} - ${h.hora}
                <button class="remover">X</button>
            `;

            // REMOVER
            item.querySelector("button").addEventListener("click", () => {

                fetch("http://localhost:3000/horarios", {
                    method: "DELETE",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify(h)
                })
                .then(() => carregarHorarios());
            });

            lista.appendChild(item);
        });
    });
}

// ==========================
// CARREGAR AGENDAMENTOS
// ==========================
function carregarAgendamentos() {

    fetch("http://localhost:3000/agendamentos-data")
    .then(res => res.json())
    .then(lista => {

        ["recebido","analise","fazendo","concluido"].forEach(id => {
            document.getElementById(id).innerHTML = "";
        });

        lista.forEach(item => {

            const card = document.createElement("div");
            card.classList.add("card");

            card.innerHTML = `
                <strong>${item.nome}</strong>
                <p>${item.data} - ${item.hora}</p>
                <small>${item.protocolo}</small>
            `;

            // CLIQUE MUDA STATUS
            card.addEventListener("click", () => {
                mudarStatus(item);
            });

            document.getElementById(item.status).appendChild(card);
        });
    });
}

// ==========================
// MUDAR STATUS (AGORA SALVA)
// ==========================
function mudarStatus(item) {

    const ordem = ["recebido","analise","fazendo","concluido"];
    let index = ordem.indexOf(item.status);
    let novoStatus = ordem[index + 1] || "concluido";

    fetch("http://localhost:3000/status", {
        method: "PUT",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            protocolo: item.protocolo,
            status: novoStatus
        })
    })
    .then(() => carregarAgendamentos());
}

// ==========================
// CSV
// ==========================
function baixarCSV() {
    window.open("http://localhost:3000/exportar-csv");
}

// ==========================
// INICIAR
// ==========================
carregarHorarios();
carregarAgendamentos();

</script>

</body>
</html>
